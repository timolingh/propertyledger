{% extends "ledgeros/base.html" %}

{% block title %}{{ page_title }} | PropertyLedger{% endblock %}

{% block content %}
  <div class="card">
    <h1>{{ page_title }}</h1>
    {% if not create_available %}
      <p class="muted">{{ create_gate_message }}</p>
      <a class="button" href="{{ create_gate_url }}">{{ create_gate_label }}</a>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="button primary">{{ page_action }}</button>
      <a class="button" href="{{ list_url }}">Back</a>
    </form>
  </div>
{% endblock %}
