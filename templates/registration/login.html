<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sign in | PropertyLedger</title>
    <style>
      :root {
        --bg: #f7f5f1;
        --panel: #ffffff;
        --text: #1f1f1f;
        --muted: #675f52;
        --border: #d8d3c8;
        --nav: #2a2a2a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #fff7ea, var(--bg));
        color: var(--text);
        font-family: Arial, sans-serif;
      }
      .card {
        width: min(92vw, 28rem);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        font-weight: 600;
        margin-top: 0.9rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.65rem;
        margin-top: 0.25rem;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      button {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        width: 100%;
        border: 1px solid var(--nav);
        border-radius: 8px;
        background: var(--nav);
        color: #fff;
        cursor: pointer;
      }
      .muted {
        color: var(--muted);
      }
      .error {
        color: #a33;
      }
      .help {
        font-size: 0.95rem;
        margin-top: 1rem;
      }
      a {
        color: #1f6f43;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in</h1>
      <p class="muted">Use your PropertyLedger account to access the app workflows.</p>
      {% if form.errors %}
        <p class="error">Your username or password was not accepted.</p>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <label for="id_username">Username</label>
        <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" required id="id_username">

        <label for="id_password">Password</label>
        <input type="password" name="password" autocomplete="current-password" required id="id_password">

        <button type="submit">Sign in</button>
      </form>
      <p class="help muted">
        Admins still use the Django admin at <a href="/admin/">/admin/</a>.
      </p>
    </div>
  </body>
</html>
